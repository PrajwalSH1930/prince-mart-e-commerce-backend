server:
  port: 8000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 15s
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**,/users/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: identityServiceCB
                fallbackUri: forward:/fallback/identity-fallback

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**,/categories/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: productServiceCB
                fallbackUri: forward:/fallback/product-fallback

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: inventoryServiceCB
                fallbackUri: forward:/fallback/inventory-fallback

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/cart/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: cartServiceCB
                fallbackUri: forward:/fallback/cart-fallback

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**,/order-items/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/order-fallback

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment-fallback

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification-fallback

        - id: shipping-service
          uri: lb://SHIPPING-SERVICE
          predicates:
            - Path=/shipments/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: shippingServiceCB
                fallbackUri: forward:/fallback/shipping-fallback

        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/reviews/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: reviewServiceCB
                fallbackUri: forward:/fallback/review-fallback

        - id: wishlist-service
          uri: lb://WISHLIST-SERVICE
          predicates:
            - Path=/wishlist/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: wishlistServiceCB
                fallbackUri: forward:/fallback/wishlist-fallback

        - id: coupon-service
          uri: lb://COUPON-SERVICE
          predicates:
            - Path=/coupons/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: couponServiceCB
                fallbackUri: forward:/fallback/coupon-fallback

        - id: audit-service
          uri: lb://AUDIT-SERVICE
          predicates:
            - Path=/audit/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: auditServiceCB
                fallbackUri: forward:/fallback/audit-fallback

        - id: subscription-service
          uri: lb://SUBSCRIPTION-SERVICE
          predicates:
            - Path=/subscriptions/**

    loadbalancer:
      cache:
        enabled: true
        ttl: 35s
      retry:
        enabled: false

eureka:
  instance:
    # On Render, we don't prefer IP because container IPs change frequently.
    # We let Eureka handle the hostname resolution.
    prefer-ip-address: false
  client:
    service-url:
      # CRITICAL CHANGE: Uses environment variable EUREKA_SERVER_URL, else defaults to localhost
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    registryFetchIntervalSeconds: 5

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3

  timelimiter:
    configs:
      default:
        timeoutDuration: 15s

logging:
  level:
    org.springframework.cloud.gateway: INFO