server:
  port: ${PORT:8081}

spring:
  application:
    name: identity-service

  datasource:
    # ✅ Uses Render DB if present, else local MySQL
    url: ${IDENTITY_DB_URL:jdbc:mysql://localhost:3306/pm_identity_db?createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Sprince1*}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: false
  client:
    # ✅ Render + Local compatible
    service-url:
      defaultZone: https://pm-server-registry.onrender.com/eureka/

logging:
  level:
    org.springframework.cloud: INFO
